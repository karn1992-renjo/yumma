name: food_delivery_restaurant
description: A complete food delivery application with customer, restaurant, and driver panels

publish_to: 'none'

version: 2.0.1+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Core
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  audioplayers: ^6.6.0
  pusher_channels_flutter: ^2.2.0
  
  # Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # Maps & Location
  google_maps_flutter: ^2.17.1
  geolocator: ^10.1.0
  
  # Image
  image_picker: ^1.0.5
  file_picker: ^8.1.2
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  vibration: ^3.1.8
  
  # Navigation
  go_router: ^13.0.0
  
  # Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Notifications
  flutter_local_notifications: ^21.0.0
  firebase_messaging: 16.2.2
  
  # Payment
  razorpay_flutter: ^1.3.5
  flutter_stripe: ^12.6.0
  flutter_cashfree_pg_sdk: ^2.3.4+51
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.1
  connectivity_plus: ^5.0.2
  flutter_easyloading: ^3.0.5
  syncfusion_flutter_charts: ^23.2.7
  
  # Printing
  printing: ^5.11.1
  
  # Charts
  fl_chart: ^0.66.0
  flutter_svg: ^2.0.7
  shimmer: ^3.0.0

  # Validation
  validators: ^3.0.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  
  # PDF
  pdf: ^3.10.7
  
  # Analytics
  firebase_analytics: ^12.4.1
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/sound/
    - android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
