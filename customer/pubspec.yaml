name: food_delivery_customer
description: A complete food delivery application with customer, restaurant, and driver panels

publish_to: 'none'

version: 2.0.6+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Core
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  audioplayers: ^6.6.0
  pusher_channels_flutter: ^2.2.0
  
  # Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # Maps & Location
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  
  # Image
  image_picker: ^1.0.5
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.4.1
  smooth_page_indicator: ^2.0.1
  vibration: ^3.1.8
  
  # Navigation
  go_router: ^17.2.3
  
  # Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Notifications
  flutter_local_notifications: ^21.0.0
  firebase_messaging: ^16.2.2
  
  # Payment
  razorpay_flutter: ^1.3.5
  flutter_stripe: ^12.6.0
  flutter_cashfree_pg_sdk: ^2.3.4+51
  
  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.1
  share_plus: 12.0.2
  connectivity_plus: ^7.1.1
  flutter_easyloading: ^3.0.5
  syncfusion_flutter_charts: ^33.2.6
  speech_to_text: ^7.2.0
  permission_handler: ^11.4.0
  
  # Printing
  printing: ^5.11.1
  
  # Charts
  fl_chart: ^1.2.0
  flutter_lucide: ^1.11.0
  shimmer: ^3.0.0

  # Validation
  validators: ^3.0.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  
  # PDF
  pdf: ^3.10.7
  
  # Analytics
  appsflyer_sdk: ^6.18.0
  firebase_analytics: ^12.4.1
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.3
  sms_autofill: ^2.2.0
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/sound/
    - assets/animations/
    - android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
